name: FireMitigationApp
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "16.0"
packages:
  Turf:
    url: https://github.com/mapbox/turf-swift.git
    from: 2.9.0
targets:
  FireMitigationApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - App
      - Models
      - Services
      - Views
      - path: Resources
        type: folder
    info:
      path: Resources/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.embesafe.WildfireProtection
        SWIFT_VERSION: 5.9
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Turf
    entitlements: null
